name: skills-coverage

on:
  pull_request:
    paths:
      - 'bootstrap/**'
      - 'factory/**'
      - 'wrapper/**'
      - 'extra/**'
      - 'fx/**'
      - 'cc-plugins/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  check-coverage:
    name: Verify boost feature change ships a skill update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run coverage check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          echo "---"

          declare -A MAP=(
            ['^bootstrap/function/adapter/contrib/cloud.google.com/pubsub/']='cc-plugins/boost/skills/boost-bootstrap-adapter-pubsub'
            ['^bootstrap/function/adapter/contrib/nats-io/']='cc-plugins/boost/skills/boost-bootstrap-adapter-nats'
            ['^bootstrap/function/adapter/contrib/confluentinc/']='cc-plugins/boost/skills/boost-bootstrap-adapter-kafka'
            ['^bootstrap/function/middleware/']='cc-plugins/boost/skills/boost-bootstrap-middleware'
            ['^bootstrap/function/']='cc-plugins/boost/skills/boost-bootstrap-function'
            ['^factory/contrib/labstack/echo/']='cc-plugins/boost/skills/boost-factory-echo'
            ['^factory/contrib/go-resty/']='cc-plugins/boost/skills/boost-factory-resty'
            ['^factory/contrib/cloud.google.com/pubsub/']='cc-plugins/boost/skills/boost-factory-pubsub'
            ['^wrapper/publisher/']='cc-plugins/boost/skills/boost-wrapper-publisher'
            ['^wrapper/cache/']='cc-plugins/boost/skills/boost-wrapper-cache'
            ['^wrapper/log/']='cc-plugins/boost/skills/boost-wrapper-log'
            ['^wrapper/config/']='cc-plugins/boost/skills/boost-wrapper-config'
            ['^fx/modules/']='cc-plugins/boost/skills/boost-fx-modules'
            ['^extra/middleware/']='cc-plugins/boost/skills/boost-extra-middleware'
            ['^extra/health/']='cc-plugins/boost/skills/boost-extra-health'
            ['^extra/multiserver/']='cc-plugins/boost/skills/boost-extra-multiserver'
          )

          missing=()
          for pattern in "${!MAP[@]}"; do
            if echo "$changed" | grep -qE "$pattern"; then
              required="${MAP[$pattern]}"
              if ! echo "$changed" | grep -qE "^$required/"; then
                src_changes=$(echo "$changed" | grep -E "$pattern" | grep -vE "_test\.go$|/vendor/|/examples/" || true)
                if [ -n "$src_changes" ]; then
                  missing+=("$pattern -> $required/SKILL.md")
                fi
              fi
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo ""
            echo "::error::Boost feature change requires a corresponding skill update under cc-plugins/boost/skills/."
            echo ""
            echo "The following boost subsystems were modified WITHOUT updating their skill:"
            for entry in "${missing[@]}"; do
              echo "  - $entry"
            done
            echo ""
            echo "Per cc-plugins/CONTRIBUTING.md, every new feature added to boost must add"
            echo "or update the corresponding skill's SKILL.md and bump its version (and the plugin version in"
            echo "cc-plugins/boost/.claude-plugin/plugin.json + .claude-plugin/marketplace.json)."
            echo ""
            echo "If this PR is a pure refactor / bug fix that does NOT change the public"
            echo "contract, add the label 'skip-skill-coverage' to bypass this check."
            exit 1
          fi

          echo "✓ All touched subsystems have corresponding skill changes."

      - name: Bypass label check
        if: failure() && contains(github.event.pull_request.labels.*.name, 'skip-skill-coverage')
        run: |
          echo "::warning::skip-skill-coverage label set — bypassing check."
          exit 0
